<div
  class="bg-white p-8 rounded-sm shadow max-w-xl flex flex-col max-h-[80vh] w-full overflow-hidden"
>
  <h2 class="text-xl font-bold mb-6">Add Job Application</h2>

  <form (ngSubmit)="submit()" class="flex-grow overflow-y-auto p-6 space-y-4">
    <!-- Company Name -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Company Name</mat-label>
      <input matInput [(ngModel)]="job.companyName" name="company" required />
    </mat-form-field>

    <!-- Position -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Position</mat-label>
      <input matInput [(ngModel)]="job.position" name="position" required />
    </mat-form-field>

    <!-- Location -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Location</mat-label>
      <input matInput [(ngModel)]="job.location" name="location" />
    </mat-form-field>

    <!-- Status -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Status</mat-label>
      <mat-select [(ngModel)]="job.status" name="status">
        <mat-option value="APPLIED">Applied</mat-option>
        <mat-option value="INTERVIEW">Interview</mat-option>
        <mat-option value="ASSESSMENT">Assessment</mat-option>
        <mat-option value="OFFER">Offer</mat-option>
        <mat-option value="REJECTED">Rejected</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Application Date -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Application Date</mat-label>
      <input matInput [matDatepicker]="picker" [(ngModel)]="job.applicationDate" name="date" />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <!-- Notes -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Notes</mat-label>
      <textarea matInput rows="3" [(ngModel)]="job.notes" name="notes"></textarea>
    </mat-form-field>

    <!-- Submit Button -->
    <button mat-raised-button color="primary" type="submit" class="w-full">Save Application</button>
  </form>
</div>
